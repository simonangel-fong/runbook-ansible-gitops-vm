---
# nginx.yml — Phase E LB weight setter.
#
# Re-runs during each canary phase with a new weight_canary. The Jenkinsfile
# passes the value via -e; this playbook templates the upstream block,
# validates, and gracefully reloads nginx.
#
# Defaults to 0/100 (no canary traffic) if invoked without args, which is the
# safe "freeze stable" posture used after a successful promote.
#
# Run from jump (manual):
#   ansible-playbook nginx.yml -e weight_canary=20
#
# Run from Jenkins (during canary phase loop):
#   ansible-playbook nginx.yml -e weight_canary=${weight}

- name: Configure nginx LB weights
  hosts: lbs
  become: true

  vars:
    weight_canary: 0
    weight_stable: "{{ 100 - (weight_canary | int) }}"

  pre_tasks:
    - name: Sanity-check weight_canary is 0..100
      ansible.builtin.assert:
        that:
          - weight_canary | int >= 0
          - weight_canary | int <= 100
        fail_msg: "weight_canary ({{ weight_canary }}) must be 0..100"

  roles:
    - nginx

  post_tasks:
    - name: Smoke test — LB returns 200 from /
      ansible.builtin.uri:
        url: "http://{{ ansible_host }}/"
        return_content: true
        status_code: 200
      delegate_to: localhost
      become: false
      register: lb_root

    - name: Show LB response
      ansible.builtin.debug:
        msg: "LB at {{ ansible_host }} returned: {{ lb_root.content }}"
