---
# roles/grafana/tasks/main.yml — H3
#
# Installs Grafana OSS from the upstream apt repo (packages.grafana.com),
# matching the pattern used for Jenkins on jump. Ubuntu's `grafana` package
# lags upstream by a year; the dashboard provisioning UX assumes current.
#
# H5 adds the datasource template and dashboard JSON. For H3 we just want
# the service up and reachable via SSH tunnel on :3000.

- name: Install Grafana apt prerequisites
  ansible.builtin.apt:
    name:
      - apt-transport-https
      - software-properties-common
      - gnupg
    state: present
    update_cache: true

- name: Create apt keyrings dir
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    mode: "0755"

- name: Import Grafana apt signing key
  ansible.builtin.get_url:
    url: https://apt.grafana.com/gpg.key
    dest: /etc/apt/keyrings/grafana.asc
    mode: "0644"
    force: false

- name: Add Grafana OSS apt repository
  ansible.builtin.copy:
    dest: /etc/apt/sources.list.d/grafana.list
    mode: "0644"
    content: |
      deb [signed-by=/etc/apt/keyrings/grafana.asc] https://apt.grafana.com stable main

- name: Install grafana
  ansible.builtin.apt:
    name: grafana
    state: present
    update_cache: true

- name: Provision Prometheus datasource
  ansible.builtin.template:
    src: datasource.yml.j2
    dest: /etc/grafana/provisioning/datasources/prometheus.yml
    owner: root
    group: grafana
    mode: "0640"
  notify: Restart grafana-server

- name: Provision dashboard provider
  ansible.builtin.template:
    src: dashboard-provider.yml.j2
    dest: /etc/grafana/provisioning/dashboards/gitops-vm.yml
    owner: root
    group: grafana
    mode: "0640"
  notify: Restart grafana-server

- name: Ensure dashboard directory exists
  ansible.builtin.file:
    path: /var/lib/grafana/dashboards
    state: directory
    owner: grafana
    group: grafana
    mode: "0755"

- name: Copy canary dashboard JSON
  ansible.builtin.copy:
    src: canary-dashboard.json
    dest: /var/lib/grafana/dashboards/canary-dashboard.json
    owner: grafana
    group: grafana
    mode: "0644"
  # No notify — Grafana rescans this directory on the interval set in the
  # dashboard provider config (10s).

- name: Ensure grafana-server is enabled and running
  ansible.builtin.systemd:
    name: grafana-server
    enabled: true
    state: started
