---
# roles/prometheus/tasks/main.yml — H3
#
# Installs the Ubuntu apt-packaged Prometheus. The default config scrapes
# only Prometheus itself, which is enough for H3's "is it up?" check. The
# real scrape config (templated prometheus.yml.j2 for the app fleet) lands
# in H4 and reloads via the role's handler.

- name: Install prometheus
  ansible.builtin.apt:
    name: prometheus
    state: present
    update_cache: true

- name: Template prometheus.yml with fleet scrape targets
  ansible.builtin.template:
    src: prometheus.yml.j2
    dest: /etc/prometheus/prometheus.yml
    owner: root
    group: root
    mode: "0644"
    validate: "promtool check config %s"
  notify: Reload prometheus

- name: Ensure prometheus is enabled and running
  ansible.builtin.systemd:
    name: prometheus
    enabled: true
    state: started
