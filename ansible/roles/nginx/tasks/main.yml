---
# roles/nginx/tasks/main.yml
#
# Templates the upstream config + ensures nginx is serving. Idempotent:
# template change triggers a config test then a graceful reload.

- name: Ensure app VM hostnames resolve via /etc/hosts on lb
  ansible.builtin.blockinfile:
    path: /etc/hosts
    marker: "# {mark} gitops-vm app upstream"
    block: |
      {{ hostvars['app-vm1'].ansible_host }}  app-vm1
      {{ hostvars['app-vm2'].ansible_host }}  app-vm2

- name: Disable default ubuntu nginx site (claims port 80)
  ansible.builtin.file:
    path: /etc/nginx/sites-enabled/default
    state: absent

- name: Template gitops upstream + server block
  ansible.builtin.template:
    src: upstream.conf.j2
    dest: /etc/nginx/conf.d/gitops.conf
    owner: root
    group: root
    mode: "0644"

- name: Validate full nginx config tree
  # Always run — handlers can silently skip across re-runs when a previous
  # run touched the file but failed to reload (e.g. validation error).
  # Reload is graceful, so running it every time is cheap.
  ansible.builtin.command: nginx -t
  changed_when: false

- name: Ensure nginx is enabled and reloaded
  ansible.builtin.systemd:
    name: nginx
    enabled: true
    state: reloaded
