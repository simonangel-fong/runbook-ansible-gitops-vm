---
# bootstrap.yml
#
# Run from jump, after cloud-init has finished:
#   1. Confirm SSH + Python on every fleet host.
#   2. Install nginx on lb (no config yet - Phase B does the templating).
#   3. Create appuser + /opt/app/{releases,current} on app VMs.

- name: Connectivity check (every fleet host)
  hosts: fleet
  gather_facts: false
  tasks:
    - name: Ping
      ansible.builtin.ping:

- name: LB base setup
  hosts: lbs
  become: true
  tasks:
    - name: Install nginx
      ansible.builtin.apt:
        name: nginx
        state: present
        update_cache: true
    - name: Enable nginx (do not start - no upstream config yet)
      ansible.builtin.systemd:
        name: nginx
        enabled: true

- name: App VM base setup
  hosts: apps
  become: true
  tasks:
    - name: Create appuser
      ansible.builtin.user:
        name: appuser
        shell: /bin/bash
        create_home: true

    - name: Create /opt/app layout
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        owner: appuser
        group: appuser
        mode: "0755"
      loop:
        - /opt/app
        - /opt/app/releases
