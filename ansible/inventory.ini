[jumps]
jump ansible_host=10.0.90.10

[lbs]
lb ansible_host=10.0.10.20

[app_canary]
app-vm1 ansible_host=10.0.20.11

[app_stable]
app-vm2 ansible_host=10.0.20.12

[apps:children]
app_canary
app_stable

[fleet:children]
lbs
apps

[all:vars]
ansible_user=ubuntu
ansible_ssh_private_key_file=~/.ssh/gitops-vm.pem
ansible_ssh_common_args=-o StrictHostKeyChecking=accept-new
# Pin Python to the /usr/bin/python3 symlink so minor-version bumps don't
# change interpreter discovery.
ansible_python_interpreter=/usr/bin/python3
