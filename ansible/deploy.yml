---
# deploy.yml — Phase E shape.
#
# Lays the binary in a versioned release directory and points the
# /opt/app/current symlink at it. Atomic symlink swap + systemctl restart
# is what makes Phase F's rollback trivial: re-point symlink at the prior
# release dir, restart.
#
# Layout produced:
#   /opt/app/
#     ├── releases/
#     │   ├── 0.1.0/gitops-api
#     │   └── 0.2.0/gitops-api
#     └── current -> releases/0.2.0
#
# Bootstrap step (one-time): if /opt/app/current already exists as a regular
# directory (left over from Phase B/D), it is removed before the symlink can
# be created.
#
# Run manually from jump (against all apps):
#   ansible-playbook deploy.yml \
#     -e binary_src=/path/to/gitops-api \
#     -e app_version=$(cat ../app/VERSION)
#
# Run targeting only the canary (Phase E pre-deploy):
#   ansible-playbook deploy.yml --limit app_canary ...
#
# Run targeting only stable hosts (Phase E promote step):
#   ansible-playbook deploy.yml --limit app_stable ...

- name: Deploy gitops-api to app VMs
  hosts: apps
  become: true
  serial: 1                # one host at a time; clean drain on restart
  any_errors_fatal: true   # halt the whole play if any host fails

  pre_tasks:
    - name: Sanity-check required extra-vars
      ansible.builtin.assert:
        that:
          - binary_src is defined
          - app_version is defined
        fail_msg: "Pass -e binary_src=/path/to/gitops-api -e app_version=X.Y.Z"

    - name: Sanity-check the binary exists on the controller
      ansible.builtin.stat:
        path: "{{ binary_src }}"
      delegate_to: localhost
      become: false
      register: binary_stat

    - name: Fail if binary missing
      ansible.builtin.fail:
        msg: "binary_src={{ binary_src }} does not exist on jump"
      when: not binary_stat.stat.exists

  tasks:
    # One-time migration: if /opt/app/current is a regular directory left over
    # from Phase B/D, remove it so the symlink can be created. No-op once
    # /opt/app/current is already a symlink.
    - name: Check whether /opt/app/current is a regular dir (pre-Phase-E state)
      ansible.builtin.stat:
        path: /opt/app/current
      register: current_stat

    - name: Migrate — remove /opt/app/current if it is a regular directory
      ansible.builtin.file:
        path: /opt/app/current
        state: absent
      when:
        - current_stat.stat.exists
        - current_stat.stat.isdir
        - not current_stat.stat.islnk

    - name: Ensure release directory for this version exists
      ansible.builtin.file:
        path: "/opt/app/releases/{{ app_version }}"
        state: directory
        owner: appuser
        group: appuser
        mode: "0755"

    - name: Copy gitops-api binary into the release directory
      ansible.builtin.copy:
        src: "{{ binary_src }}"
        dest: "/opt/app/releases/{{ app_version }}/gitops-api"
        owner: appuser
        group: appuser
        mode: "0755"

    - name: Atomically swap /opt/app/current to this release
      ansible.builtin.file:
        src: "/opt/app/releases/{{ app_version }}"
        dest: /opt/app/current
        state: link
        owner: appuser
        group: appuser
        force: true        # replace existing symlink in place
      notify: Restart gitops-api

    - name: Template systemd unit
      ansible.builtin.template:
        src: gitops-api.service.j2
        dest: /etc/systemd/system/gitops-api.service
        owner: root
        group: root
        mode: "0644"
      notify:
        - Reload systemd
        - Restart gitops-api

    - name: Enable gitops-api (start handled by handler on first deploy)
      ansible.builtin.systemd:
        name: gitops-api
        enabled: true

  post_tasks:
    - name: Flush handlers so smoke test runs against the new binary
      ansible.builtin.meta: flush_handlers

    - name: Smoke test — GET /healthz
      ansible.builtin.uri:
        url: "http://{{ ansible_host }}:8080/healthz"
        status_code: 200
      delegate_to: localhost
      become: false
      retries: 6
      delay: 2
      register: healthz
      until: healthz.status == 200

    - name: Smoke test — GET / reports the expected version
      ansible.builtin.uri:
        url: "http://{{ ansible_host }}:8080/"
        return_content: true
      delegate_to: localhost
      become: false
      register: root

    - name: Assert version matches
      ansible.builtin.assert:
        that:
          - root.json.version == app_version
        fail_msg: "{{ inventory_hostname }} reports {{ root.json.version }}, expected {{ app_version }}"

  handlers:
    - name: Reload systemd
      ansible.builtin.systemd:
        daemon_reload: true

    - name: Restart gitops-api
      ansible.builtin.systemd:
        name: gitops-api
        state: restarted
