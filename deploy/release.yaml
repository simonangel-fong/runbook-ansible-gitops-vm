# release.yaml: declarative source of truth for the running app.
# Schema:
#   version           - the build to deploy. Must match app/VERSION at the time of build (Jenkins re-builds from source).
#   phases            - ordered list of canary weight steps.
#     weight_canary   - percentage of LB traffic to send to canary_host (0-100). The complement goes to stable_hosts.
#     hold_seconds    - how long to keep the weight before advancing.
#   canary_host       - inventory name of the canary VM.
#   stable_hosts      - list of inventory names that get promoted only after a successful 100% canary phase.
#   health_check      - Jenkins polls http://{canary_host}:8080/healthz every interval_seconds during each phase.
#                       failure_threshold consecutive non-200s aborts.

version: "0.3.1"

# control health check
build_healthy: true # happy
# build_healthy: false  # false

phases:
  - weight_canary: 20
    hold_seconds: 60
  - weight_canary: 50
    hold_seconds: 60
  - weight_canary: 100
    hold_seconds: 0

canary_host: app-vm1
stable_hosts:
  - app-vm2

health_check:
  interval_seconds: 3
  failure_threshold: 3
